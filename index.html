    :root{

      --ink:#2f382d;
      --muted:#7d7d70;
      --clay:#b67f67;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:'DM Sans',sans-serif;
      color:var(--ink);
      background:#f7f2ea;
      width:100%;
    }
    .serif{font-family:'Cormorant Garamond',serif}
    .hero-overlay{
      background:linear-gradient(90deg, rgba(35,48,35,.72), rgba(35,48,35,.34), rgba(35,48,35,.06));
    }
    .soft-shadow{box-shadow:0 18px 50px rgba(74,89,70,.14)}
    .product-card{
      transition:transform .35s ease, box-shadow .35s ease, opacity .25s ease;
    }
    .product-card:hover{
      transform:translateY(-7px);
      box-shadow:0 20px 40px rgba(68,79,63,.13);
    }
    .product-card img{transition:transform .6s ease}
    .product-card:hover img{transform:scale(1.04)}
    .filter-btn.active{
      background:var(--sage-dark);
      color:#fff;
      border-color:var(--sage-dark);
    }
    .cart-panel{
      transform:translateX(100%);
      transition:transform .38s cubic-bezier(.22,1,.36,1);
    }
    .cart-panel.open{transform:translateX(0)}
    .cart-overlay{
      opacity:0;
      pointer-events:none;
      transition:opacity .3s ease;
    }
    .cart-overlay.open{
      opacity:1;
      pointer-events:auto;
    }
    .toast{
      opacity:0;
      transform:translateY(18px);
      pointer-events:none;
      transition:all .28s ease;
    }
    .toast.show{
      opacity:1;
      transform:translateY(0);
    }
    .fade-up{
      animation:fadeUp .8s ease both;
    }
    .fade-up.delay-1{animation-delay:.12s}
    .fade-up.delay-2{animation-delay:.24s}
    .fade-up.delay-3{animation-delay:.36s}
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(18px)}
      to{opacity:1;transform:translateY(0)}
    }
    .cart-item{
      animation:fadeUp .3s ease both;
    }
    .focus-ring:focus-visible{
      outline:2px solid #71806a;
      outline-offset:3px;
    }
  </style>

    <div class="flex items-center justify-between mb-4"><span data-template-id="cart-total-label" class="canva-text text-[12px] uppercase tracking-[0.16em]"></span> <span id="cart-total" class="serif text-[30px]">$0</span>
    </div><button id="whatsapp-order" data-template-id="whatsapp-button" class="canva-button focus-ring w-full py-4 bg-[#5f735b] text-white rounded-full uppercase tracking-[0.14em] text-[12px] hover:bg-[#4d604b] transition disabled:opacity-50 disabled:cursor-not-allowed" type="button"></button> <button id="continue-shopping" data-template-id="continue-button" class="canva-button focus-ring w-full mt-3 py-3 border border-[#d5cab9] rounded-full uppercase tracking-[0.14em] text-[11px] hover:bg-[#eee6db] transition" type="button"></button>
   </div>
  </aside>
  <template id="cart-item-template">
   <div data-template-id="cart-item" class="canva-card cart-item flex gap-3 pb-4 border-b border-[#eee5d9]">
    <div class="w-16 h-20 bg-[#eee8df] overflow-hidden shrink-0"><img data-template-id="cart-item-image" loading="lazy" class="canva-image w-full h-full object-cover">
    </div>
    <div class="flex-1 min-w-0">
     <h3 data-template-id="cart-item-name" class="canva-text serif text-[22px] leading-tight"></h3>
     <p data-template-id="cart-item-price" class="canva-text mt-1 text-[13px]"></p>
     <div class="mt-3 flex items-center justify-between gap-2">
      <div class="flex items-center border border-[#d7ccbc] rounded-full overflow-hidden"><button class="qty-minus focus-ring w-8 h-8 flex items-center justify-center hover:bg-[#eee6db]" type="button" aria-label="Disminuir cantidad"> <i data-lucide="minus" class="w-3 h-3"></i> </button> <span class="qty-value min-w-[28px] text-center text-[12px]">1</span> <button class="qty-plus focus-ring w-8 h-8 flex items-center justify-center hover:bg-[#eee6db]" type="button" aria-label="Aumentar cantidad"> <i data-lucide="plus" class="w-3 h-3"></i> </button>
      </div><button class="remove-item focus-ring text-[#8a6c5d] hover:text-[#654c40] transition" type="button" aria-label="Eliminar producto"> <i data-lucide="trash-2" class="w-4 h-4"></i> </button>

    </div>
   </div>

  <div id="toast" class="toast fixed bottom-6 left-1/2 -translate-x-1/2 z-[80] bg-[#30402f] text-white px-5 py-3 rounded-full text-[12px] uppercase tracking-[0.14em] shadow-lg"><span data-template-id="toast-message" class="canva-text"></span>
  </div>
  <script src="/_sdk/editing_sdk.js"></script>
  <script>
    const products = {
      sage: { name: "Salvia blanca", price: 6900, image: "product-1-image" },
      amethyst: { name: "Amatista natural", price: 8900, image: "product-2-image" },
      candle: { name: "Vela ritual Calma", price: 11900, image: "product-3-image" },
      palo: { name: "Palo santo", price: 5900, image: "product-4-image" },
      "kit-cleansing": { name: "Kit limpieza energética", price: 21900, image: "product-5-image" },
      "kit-meditation": { name: "Kit pausa sagrada", price: 24900, image: "product-6-image" },
      reiki: { name: "Sesión Reiki", price: 32000, image: "product-7-image" },
      journal: { name: "Diario de gratitud", price: 12900, image: "product-8-image" }
    };

    const cart = {};
    const cartCount = document.getElementById('cart-count');
    const cartTotal = document.getElementById('cart-total');
    const cartItems = document.getElementById('cart-items');
    const emptyCart = document.getElementById('empty-cart');
    const cartPanel = document.getElementById('cart-panel');
    const cartOverlay = document.getElementById('cart-overlay');
    const whatsappBtn = document.getElementById('whatsapp-order');
    const toast = document.getElementById('toast');

    function playTone(freq = 520, duration = 0.06) {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.025, ctx.currentTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
        oscillator.connect(gain);
        gain.connect(ctx.destination);
        oscillator.start();
        oscillator.stop(ctx.currentTime + duration + 0.02);
      } catch(e) {}
    }

    function money(value){
      return '$' + value.toLocaleString('es-CL');
    }

    function openCart(){
      cartPanel.classList.add('open');
      cartOverlay.classList.add('open');
      cartPanel.setAttribute('aria-hidden','false');
      playTone(420);
    }

    function closeCart(){
      cartPanel.classList.remove('open');
      cartOverlay.classList.remove('open');
      cartPanel.setAttribute('aria-hidden','true');
      playTone(320);
    }

    function showToast(){
      toast.classList.add('show');
      setTimeout(()=>toast.classList.remove('show'), 1800);
    }

    function updateCart(){
      const keys = Object.keys(cart);
      let totalQty = 0;
      let total = 0;
      keys.forEach(id => {
        totalQty += cart[id].qty;
        total += cart[id].qty * products[id].price;
      });

      cartCount.textContent = totalQty;
      cartTotal.textContent = money(total);
      whatsappBtn.disabled = keys.length === 0;

      const existing = new Map([...cartItems.children].map(el => [el.dataset.id, el]));

      keys.forEach(id => {
        const item = cart[id];
        let row = existing.get(id);
        if(!row){
          const tpl = document.getElementById('cart-item-template').content.cloneNode(true);
          row = tpl.querySelector('[data-template-id="cart-item"]');
          row.dataset.id = id;

          const sourceImg = document.querySelector(`[data-template-id="${products[id].image}"]`);
          const img = row.querySelector('[data-template-id="cart-item-image"]');
          if(sourceImg && sourceImg.src){
            img.src = sourceImg.src;
            img.alt = sourceImg.alt || products[id].name;
          }

          row.querySelector('[data-template-id="cart-item-name"]').textContent = products[id].name;
          row.querySelector('[data-template-id="cart-item-price"]').textContent = money(products[id].price);

          row.querySelector('.qty-plus').addEventListener('click', ()=> {
            cart[id].qty += 1;
            playTone(560);
            updateCart();
          });
          row.querySelector('.qty-minus').addEventListener('click', ()=> {
            if(cart[id].qty > 1){
              cart[id].qty -= 1;
            }else{
              delete cart[id];
            }
            playTone(380);
            updateCart();
          });
          row.querySelector('.remove-item').addEventListener('click', ()=> {
            delete cart[id];
            playTone(300);
            updateCart();
          });

          cartItems.appendChild(row);
          lucide.createIcons();
        } else {
          existing.delete(id);
        }
        row.querySelector('.qty-value').textContent = item.qty;
      });

      existing.forEach(el => el.remove());

      if(keys.length){
        emptyCart.classList.add('hidden');
        cartItems.classList.remove('hidden');
      }else{
        emptyCart.classList.remove('hidden');
        cartItems.classList.add('hidden');
      }
    }

    document.querySelectorAll('.add-to-cart').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const card = btn.closest('[data-product-id]');
        const id = card.dataset.productId;
        if(!cart[id]) cart[id] = { qty: 0 };
        cart[id].qty += 1;
        btn.classList.add('scale-110');
        setTimeout(()=>btn.classList.remove('scale-110'), 180);
        playTone(620);
        updateCart();
        showToast();
      });
    });

    document.querySelectorAll('.filter-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const filter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        playTone(480);
        document.querySelectorAll('.product-card').forEach(card=>{
          const show = filter === 'all' || card.dataset.category === filter;
          card.style.display = show ? '' : 'none';
        });
      });
    });

    document.getElementById('open-cart').addEventListener('click', openCart);
    document.getElementById('close-cart').addEventListener('click', closeCart);
    document.getElementById('continue-shopping').addEventListener('click', closeCart);
    cartOverlay.addEventListener('click', closeCart);
    document.getElementById('hero-cta').addEventListener('click', ()=>{
      document.getElementById('tienda').scrollIntoView({behavior:'smooth'});
      playTone(520);
    });

    whatsappBtn.addEventListener('click', ()=>{
      const keys = Object.keys(cart);
      if(!keys.length) return;
      let lines = ['Hola, quiero hacer este pedido en Somos Luz:', ''];
      let total = 0;
      keys.forEach(id=>{
        const subtotal = cart[id].qty * products[id].price;
        total += subtotal;
        lines.push(`• ${products[id].name} x${cart[id].qty} - ${money(subtotal)}`);
      });
      lines.push('');
      lines.push(`Total: ${money(total)}`);
      const url = 'https://wa.me/56900000000?text=' + encodeURIComponent(lines.join('\n'));
      window.open(url, '_blank', 'noopener,noreferrer');
      playTone(700);
    });

    updateCart();
    lucide.createIcons();
  </script>
