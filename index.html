<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somos Luz</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <header class="site-header">
        <div class="header-center">
            <h1 class="brand-title">Somos Luz</h1>
            <p class="brand-subtitle">Centro de Sanación y Bienestar</p>
        </div>
        <div class="header-right">
            <button id="cart-button">🛒 Carrito <span class="cart-count">0</span></button>
        </div>
    </header>

    <main class="main-content">
        <div class="filter-container">
            <button class="filter-btn active" data-type="todos">Ver Todo</button>
            <button class="filter-btn" data-type="producto">Productos</button>
            <button class="filter-btn" data-type="kit">Kits Holísticos</button>
            <button class="filter-btn" data-type="servicio">Servicios y Terapias</button>
        </div>

        <section id="products-services" class="catalog-grid"></section>

        <section id="cart-container" class="hidden">
            <h2>Tu Carrito</h2>
            <div id="cart-items"></div>
            <div id="cart-summary">
                <p>Total: <span id="cart-total">0</span></p>
            </div>
            <button id="checkout-button">Enviar Pedido por WhatsApp</button>
            <button id="close-cart">Cerrar</button>
        </section>

        <div style="text-align: center; margin-top: 20px;">
            <a href="#" id="admin-link" style="color: #ccc; font-size: 12px;">Panel de Administración</a>
            
            <section id="admin-panel" class="hidden">
                <h2>Panel de Administración</h2>
                <div id="login-form">
                    <input type="text" id="admin-username" placeholder="Usuario">
                    <input type="password" id="admin-password" placeholder="Contraseña">
                    <button id="admin-login-btn">Iniciar Sesión</button>
                </div>
                
                <div id="catalog-manager" class="hidden">
                    <h3>Gestionar Catálogo</h3>
                    <form id="product-form" class="admin-form">
                        <input type="hidden" id="product-id-input">
                        <input type="text" id="product-name-input" placeholder="Nombre" required>
                        <textarea id="product-description-input" placeholder="Descripción" rows="2" required></textarea>
                        <input type="number" id="product-price-input" placeholder="Precio" required>
                        <input type="text" id="product-image-url-input" placeholder="URL de la Imagen" required>
                        <select id="product-type-input" required>
                            <option value="producto">Producto</option>
                            <option value="kit">Kit Holístico</option>
                            <option value="servicio">Servicio</option>
                        </select>
                        <button type="submit" id="add-edit-btn">Añadir/Guardar Producto</button>
                    </form>

                    <h4>Productos y Servicios Actuales</h4>
                    <div id="current-catalog"></div>
                </div>
            </section>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
